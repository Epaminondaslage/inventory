# =============================================================
# docker-compose.yml — Inventory Agent + Swagger UI
# Projeto: Sentinela — Sítio Pé de Serra
#
# network_mode: host — compartilha namespace de rede do host
# permitindo que o agente leia /proc/net/tcp do host e
# colete todas as portas abertas corretamente.
# =============================================================

services:

  inventory-agent:
    build: .
    container_name: inventory-agent

    # Compartilha namespace de rede do host
    # Permite leitura correta de /proc/net/tcp e /proc/net/tcp6
    network_mode: host

    restart: always

    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/os-release:ro
      - /etc/hostname:/host/etc/hostname:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro

    environment:
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys

    read_only: true

    tmpfs:
      - /tmp
      - /var/run
      - /var/run/apache2
      - /var/lock

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H 'Authorization: Bearer sentinela_token_123' http://localhost:8090/api/inventory_agent.php > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: sentinela-swagger

    ports:
      - "8093:8080"

    restart: always

    environment:
      - SWAGGER_JSON=/app/openapi.yaml

    volumes:
      - ./api/openapi.yaml:/app/openapi.yaml:ro
